name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate JavaScript syntax
      run: node .github/scripts/validate-js-syntax.js

    - name: Validate JSON files
      run: node .github/scripts/validate-json.js

    - name: Validate SKILL.md integrity
      run: node .github/scripts/validate-skill-md.js

    - name: Install test dependencies
      run: npm install

    - name: Run unit tests
      run: npm run test:unit

    - name: Run integration tests
      run: npm run test:integration

    - name: Run regression tests
      run: npm run test:regression

    - name: Run tests with coverage
      run: npm run test:coverage

  # ── 与 openyida 主项目的集成测试 ─────────────────────────────────────
  # 验证当前 PR 的 yida-skills 代码装入 openyida 后，主项目测试套件仍能通过
  integration-with-openyida:
    name: Integration with openyida
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout yida-skills (current PR)
      uses: actions/checkout@v4
      with:
        path: yida-skills

    - name: Checkout openyida
      uses: actions/checkout@v4
      with:
        repository: openyida/openyida
        path: openyida

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Mount current yida-skills into openyida
      # 用当前 PR 的代码替代 install-skills.sh 克隆的结果
      # 模拟用户安装了这个版本的 yida-skills 后的真实状态
      run: |
        mkdir -p openyida/.claude/skills
        cp -r yida-skills/. openyida/.claude/skills/

    - name: Install openyida dependencies
      run: npm install
      working-directory: openyida

    - name: Run openyida test suite
      run: npm test
      working-directory: openyida
